<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 255 218" xml:space="preserve">
<defs>
	<linearGradient id="top-gradient" x2="0" y2="1">
		<stop offset="0%" stop-color="#3a87ff" />
		<stop offset="100%" stop-color="rgb(0, 60, 200)" />
	</linearGradient>
	<linearGradient id="bottom-gradient" x2="0" y2="1">
		<stop offset="0%" stop-color="#ffc300" />
		<stop offset="100%" stop-color="#ff6200" />
	</linearGradient>
</defs>
<style type="text/css">
	:root {
		--top-color: blue;
		--bottom-color: yellow;
	}

	@keyframes show {
		0% {
			opacity: 0;
		}
		100% {
			opacity: 1;
		}
	}

	.bg { fill: #000; display: none; }

	.letter {
		opacity: 0;
		animation: show 0.15s linear forwards;
		animation-delay: 0s;
	}

	.letter-1 { animation-delay: 1s; }
	.letter-2 { animation-delay: 1.2s; }
	.letter-3 { animation-delay: 1.4s; }

	.letter-4 { animation-delay: 1.6s; }
	.letter-5 { animation-delay: 1.8s; }
	.letter-6 { animation-delay: 2.0s; }
	.letter-7 { animation-delay: 2.2s; }

	.top .letter { fill:var(--top-color); }
	.bottom .letter { fill:var(--bottom-color); }
	.top .letter {
		fill: url(#top-gradient) #fff;
	}
	.bottom .letter {
		fill: url(#bottom-gradient) #fff;
	}
</style>
<script type="text/javascript">
	window.addEventListener('load', function() {
		const root = document.documentElement;
		const queryString = window.location.search;
		const urlParams = new URLSearchParams(queryString);
		
		if (urlParams.get('color1')) {
			root.style.setProperty('--top-color', '#'+urlParams.get('color1'));
		}

		if (urlParams.get('color2')) {
			root.style.setProperty('--bottom-color', '#'+urlParams.get('color2'));
		}

	},false);
</script>
